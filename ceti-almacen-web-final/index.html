<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sistema CETI</title>
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    <style>
      .login-body {
        background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: white;
        border-radius: 18px;
        padding: 2rem;
        box-shadow: 0 20px 45px rgba(0,0,0,0.2);
        width: min(430px, 92vw);
      }
      .logo {
        width: 90px;
        margin: 0 auto 1rem;
      }
    </style>
  </head>
  <body class="login-body">
    <div class="login-card">
      <div class="text-center mb-4">
        <img src="assets/images/logo-ceti.png" alt="CETI Colomos" class="logo" />
        <h2 class="mb-2">Sistema de Inventario</h2>
        <p class="text-muted">Gestión de recursos con etiquetas inteligentes</p>
      </div>

      <form id="login-form" action="dashboard.html" method="get">
        <div class="mb-3">
          <label for="usuario" class="form-label">Usuario</label>
          <input type="text" class="form-control" id="usuario" name="usuario" value="admin" required />
        </div>
        <div class="mb-4">
          <label for="contrasena" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="contrasena" name="contrasena" value="admin123" required />
        </div>
        <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
      </form>

      <div class="alert alert-info mt-3 mb-2">
        <small><strong>Demo:</strong> admin / admin123</small>
      </div>
      <div class="text-center">
        <button type="button" id="btn-reset-demo" class="btn btn-link btn-sm text-muted">¿No ves los datos de ejemplo? Restablecer datos</button>
      </div>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
