<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Reporte - Sistema CETI</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet" />
    <link href="../css/dashboard.css" rel="stylesheet" />
    <style>
      body { font-size: .875rem; }
      .sidebar { position: fixed; top: 0; bottom: 0; left: 0; z-index: 100; padding: 48px 0 0; box-shadow: inset -1px 0 0 rgba(0,0,0,.1); }
      .navbar-brand { padding-top: .75rem; padding-bottom: .75rem; font-size: 1rem; background-color: rgba(0,0,0,.25); box-shadow: inset -1px 0 0 rgba(0,0,0,.25); }
    </style>
  </head>
  <body data-module="reportes" data-action="create">
    <nav class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
      <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3" href="../dashboard.html">
        <img src="../assets/images/logo-ceti.png" alt="CETI" height="30" class="d-inline-block align-top" />
        Sistema Inventario
      </a>
      <ul class="navbar-nav px-3">
        <li class="nav-item text-nowrap">
          <span class="navbar-text me-3">Admin CETI</span>
          <a class="btn btn-outline-light btn-sm" href="../index.html">Cerrar Sesión</a>
        </li>
      </ul>
    </nav>

    <div class="container-fluid">
      <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
          <div class="position-sticky pt-3">
            <ul class="nav flex-column">
              <li class="nav-item"><a class="nav-link" href="../dashboard.html">Dashboard</a></li>
              <li class="nav-item"><a class="nav-link" href="usuarios.html">Usuarios</a></li>
              <li class="nav-item"><a class="nav-link" href="almacenes.html">Almacenes</a></li>
              <li class="nav-item"><a class="nav-link" href="categorias.html">Categorías</a></li>
              <li class="nav-item"><a class="nav-link" href="items.html">Items</a></li>
              <li class="nav-item"><a class="nav-link active" href="reportes.html">Reportes</a></li>
              <li class="nav-item"><a class="nav-link" href="perfil.html">Mi Perfil</a></li>
            </ul>
          </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
          <div class="d-flex justify-content-between align-items-center pb-2 mb-3 border-bottom">
            <h1 class="h2">Crear Nuevo Reporte</h1>
            <a href="reportes.html" class="btn btn-secondary">Volver</a>
          </div>

          <div class="card">
            <div class="card-body">
              <form id="module-form">
                <div class="row">
                  <div class="col-md-6 mb-3"><label class="form-label">Código</label><input type="text" class="form-control" name="codigo_reporte" readonly /><small class="text-muted">Se genera automáticamente (RPT-AAAAMMDD-NNN)</small></div>
                  <div class="col-md-6 mb-3"><label class="form-label">Título</label><input type="text" class="form-control" name="titulo" required /></div>
                </div>
                <div class="row">
                  <div class="col-md-6 mb-3"><label class="form-label">Item relacionado *</label><select class="form-control" name="id_item" data-placeholder="Seleccionar item" required></select></div>
                  <div class="col-md-6 mb-3"><label class="form-label">Tipo</label><select class="form-control" name="tipo_reporte"><option value="preventivo">Preventivo</option><option value="correctivo">Correctivo</option><option value="general">General</option><option value="mejora">Mejora</option></select></div>
                </div>
                <div class="row">
                  <div class="col-md-6 mb-3"><label class="form-label">Prioridad</label><select class="form-control" name="prioridad"><option value="baja">Baja</option><option value="media">Media</option><option value="alta">Alta</option><option value="urgente">Urgente</option></select></div>
                  <div class="col-md-6 mb-3"><label class="form-label">Estado</label><select class="form-control" name="estado"><option value="pendiente">Pendiente</option><option value="en_proceso">En Proceso</option><option value="completado">Completado</option><option value="cancelado">Cancelado</option></select></div>
                </div>
                <div class="mb-3"><label class="form-label">Fecha límite</label><input type="date" class="form-control" name="fecha_limite" /></div>
                <div class="mb-3"><label class="form-label">Descripción</label><textarea class="form-control" rows="4" name="descripcion"></textarea></div>
                <button type="submit" class="btn btn-success">Crear Reporte</button>
              </form>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="../js/app.js"></script>
  </body>
</html>
