<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CETI Almacén | Inventario</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-inline">
        <a class="brand" href="index.html">
          <img src="assets/images/logo-ceti.png" alt="CETI Colomos" />
          <span>CETI Almacén</span>
        </a>
        <nav class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a class="active" href="inventario.html">Inventario</a>
          <a href="reportes.html">Reportes</a>
        </nav>
      </div>
    </header>

    <main class="container inventory-page">
      <section class="page-title">
        <h1>Inventario</h1>
        <p>Agrega o consulta productos de forma sencilla.</p>
      </section>

      <section class="card form-card">
        <h3>Agregar producto</h3>
        <form id="inventory-form">
          <div class="form-grid">
            <label>
              Producto
              <input type="text" name="producto" placeholder="Ej. Cable USB" required />
            </label>
            <label>
              Categoría
              <input type="text" name="categoria" placeholder="Ej. Electrónica" required />
            </label>
            <label>
              Cantidad
              <input type="number" name="cantidad" min="0" value="1" required />
            </label>
            <label>
              Ubicación
              <input type="text" name="ubicacion" placeholder="Ej. A1-02" required />
            </label>
          </div>
          <button class="btn btn-primary" type="submit">Guardar producto</button>
        </form>
      </section>

      <section class="card">
        <h3>Listado de productos</h3>
        <table>
          <thead>
            <tr>
              <th>Producto</th>
              <th>Categoría</th>
              <th>Cantidad</th>
              <th>Ubicación</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="inventory-table-body"></tbody>
        </table>
      </section>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
